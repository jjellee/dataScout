name: Daily Market Data Collection & Telegram Notification

on:
  schedule:
    # Runs at 07:30 UTC (which is 16:30 KST) Monday through Friday
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

jobs:
  collect-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial to allow pushing the collected CSV data back to the repo

    steps:
      # 1. Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      # 3. Install required packages
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Execute data collector script
      - name: Run Daily Data Collection
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          python collector.py

      # 5. Send Telegram Watchlist briefing
      - name: Run Telegram Notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python telegram_sender.py

      # 6. Commit the new CSV files back to the repository
      - name: Commit and Push Collected Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add data_kr/
          
          # Commit only if there are changes
          if git diff --staged --quiet; then
            echo "No new data files collected today. Skipping commit."
          else
            git commit -m "Auto-update daily market data: $(date +'%Y-%m-%d')"
            git push
          fi
